<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-label="Tempat tidur dengan bantal Softtin">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff8ff"/>
      <stop offset="1" stop-color="#cfe6fb"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f3fd"/>
    </linearGradient>
    <linearGradient id="bed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f9ff"/>
      <stop offset="1" stop-color="#dbeefe"/>
    </linearGradient>
  </defs>
  <rect width="900" height="620" rx="28" fill="url(#sky)"/>
  <!-- headboard -->
  <rect x="120" y="120" width="660" height="170" rx="26" fill="#bfe2fe" opacity="0.6"/>
  <!-- mattress -->
  <rect x="90" y="300" width="720" height="210" rx="30" fill="url(#bed)" stroke="#bfe2fe" stroke-width="3"/>
  <!-- duvet fold -->
  <path d="M90 430 Q450 470 810 430 L810 500 Q450 540 90 500 Z" fill="#ffffff" opacity="0.7"/>
  <!-- big pillow left -->
  <rect x="160" y="210" width="260" height="150" rx="46" fill="url(#soft)" stroke="#bfe2fe" stroke-width="3" transform="rotate(-3 290 285)"/>
  <!-- big pillow right -->
  <rect x="480" y="210" width="260" height="150" rx="46" fill="url(#soft)" stroke="#bfe2fe" stroke-width="3" transform="rotate(3 610 285)"/>
  <!-- front accent pillow -->
  <rect x="350" y="300" width="200" height="120" rx="40" fill="#ffffff" stroke="#93d0fd" stroke-width="3"/>
  <circle cx="450" cy="360" r="20" fill="#dbeefe" stroke="#60b4fa" stroke-width="3"/>
  <!-- cloud accent -->
  <g opacity="0.9" transform="translate(600 70)">
    <ellipse cx="40" cy="30" rx="40" ry="26" fill="#ffffff"/>
    <ellipse cx="80" cy="26" rx="34" ry="22" fill="#ffffff"/>
    <ellipse cx="62" cy="44" rx="48" ry="22" fill="#ffffff"/>
  </g>
</svg>
